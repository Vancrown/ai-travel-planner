# AI Travel Planner — local dev and production-compatible compose
# Use with: docker compose up --build

services:
  web:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - LOG_LEVEL=INFO
      - APP_ENV=production
    restart: unless-stopped

  # Optional: run with env from .env.example for demo (set OPENAI_API_KEY in .env)
  # web:
  #   build: .
  #   ports:
  #     - "8080:8080"
  #   env_file: .env.example
  #   environment:
  #     - OPENAI_API_KEY=${OPENAI_API_KEY}
